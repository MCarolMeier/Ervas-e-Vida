<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inscreva-se – Jardim das Plantas</title>

  <!-- Mesma família tipográfica usada na página da Marcela -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="CSS/inscricao.css" />
</head>
<body>

  <main class="page">

    <!-- ========================
         ILUSTRAÇÃO PRINCIPAL
    ======================== -->
    <div class="hero-image" aria-hidden="true">
      <img src="./ING/gif planta.gif"
           alt=""
           class="hero-image__img" />
    </div>

    <!-- ========================
         CABEÇALHO DE TEXTO
    ======================== -->
    <header class="page__header">
      <h1 class="page__title">Inscreva-se</h1>
      <p class="page__subtitle">Receba dicas de cultivo e receitas de plantas medicinais direto no seu e-mail</p>
    </header>

    <!-- ========================
         FORMULÁRIO DE INSCRIÇÃO
    ======================== -->
    <form class="signup-form" id="signupForm" novalidate>

      <!-- Campo Nome -->
      <div class="field">
        <label for="nome" class="field__label">Nome</label>
        <input
          type="text"
          id="nome"
          name="nome"
          class="field__input"
          placeholder="Nome"
          autocomplete="name"
          required
          aria-describedby="nome-error"
        />
        <span class="field__error" id="nome-error" role="alert"></span>
      </div>

      <!-- Campo Senha -->
      <div class="field">
        <label for="senha" class="field__label">Senha</label>
        <div class="field__password-wrap">
          <input
            type="password"
            id="senha"
            name="senha"
            class="field__input"
            placeholder="Senha"
            autocomplete="new-password"
            minlength="6"
            required
            aria-describedby="senha-error senha-hint"
          />
          <button type="button" class="field__toggle-visibility" id="toggleSenha" aria-label="Mostrar senha" aria-pressed="false">
            <span class="field__toggle-icon" aria-hidden="true">👁</span>
          </button>
        </div>
        <span class="field__hint" id="senha-hint">Mínimo de 6 caracteres</span>
        <span class="field__error" id="senha-error" role="alert"></span>
      </div>

      <!-- Campo Email -->
      <div class="field">
        <label for="email" class="field__label">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          class="field__input"
          placeholder="Email"
          autocomplete="email"
          required
          aria-describedby="email-error"
        />
        <span class="field__error" id="email-error" role="alert"></span>
      </div>

      <!-- Botão de envio -->
      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="btn-submit__text">Inscrevasse</span>
        <span class="btn-submit__spinner" aria-hidden="true"></span>
      </button>

      <!-- Mensagem de sucesso (escondida até o envio) -->
      <p class="form-success" id="formSuccess" role="status" aria-live="polite"></p>

      <!-- Link para quem já tem conta -->
      <p class="form-switch">
        Já tem conta?
        <a href="login.html">Entrar</a>
      </p>

    </form>

  </main>

  <!-- auth.js precisa vir ANTES de inscricao.js, que depende das funções dele -->
  <script src="JS/auth.js"></script>
  <script src="JS/inscricao.js"></script>
</body>
</html>
